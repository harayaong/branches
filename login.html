<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Playtag Ops — 로그인</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='7' fill='%2300c5a1'/><rect x='5' y='20' width='4' height='7' rx='1' fill='white'/><rect x='11' y='14' width='4' height='13' rx='1' fill='white'/><rect x='17' y='9' width='4' height='18' rx='1' fill='white'/><rect x='23' y='5' width='4' height='22' rx='1' fill='white'/></svg>">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: linear-gradient(135deg, #009e82 0%, #00c5a1 60%, #4dd9bf 100%);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    font-family: 'Noto Sans KR', sans-serif; padding: 20px;
  }
  .card {
    background: white; border-radius: 20px; padding: 40px 36px;
    width: 100%; max-width: 380px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: fadeUp .4s ease both;
  }
  @keyframes fadeUp { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:translateY(0)} }

  .logo { display: flex; align-items: center; gap: 10px; margin-bottom: 28px; }
  .logo-mark {
    width: 36px; height: 36px; background: #00c5a1; border-radius: 10px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-mark svg { width: 20px; height: 20px; }
  .logo-text { font-size: 18px; font-weight: 700; color: #1a1d23; }
  .logo-sub { font-size: 11px; color: #9ca3af; margin-top: 1px; }

  h2 { font-size: 22px; font-weight: 700; color: #1a1d23; margin-bottom: 6px; }
  .desc { font-size: 13px; color: #6b7280; margin-bottom: 28px; }

  .field { margin-bottom: 16px; }
  label { display: block; font-size: 12px; font-weight: 600; color: #374151; margin-bottom: 6px; }
  input {
    width: 100%; padding: 12px 14px; border: 1.5px solid #e8eaed; border-radius: 10px;
    font-family: 'Noto Sans KR', sans-serif; font-size: 14px; color: #1a1d23;
    outline: none; transition: border-color .2s, box-shadow .2s;
  }
  input:focus { border-color: #00c5a1; box-shadow: 0 0 0 3px rgba(0,197,161,.12); }
  input::placeholder { color: #9ca3af; }
  input[type="password"] { font-family: 'DM Mono', monospace; letter-spacing: .1em; }

  .btn {
    width: 100%; padding: 13px; background: #00c5a1; border: none; border-radius: 10px;
    color: white; font-family: 'Noto Sans KR', sans-serif; font-size: 15px; font-weight: 600;
    cursor: pointer; transition: background .2s, transform .1s; margin-top: 8px;
  }
  .btn:hover { background: #009e82; }
  .btn:active { transform: scale(.98); }
  .btn:disabled { background: #9ca3af; cursor: not-allowed; }

  .error {
    display: none; background: #fef2f2; border: 1px solid #fecaca;
    color: #991b1b; font-size: 13px; padding: 10px 14px; border-radius: 8px;
    margin-bottom: 16px; text-align: center;
  }
  .error.show { display: block; }

  .spinner {
    display: inline-block; width: 16px; height: 16px;
    border: 2px solid rgba(255,255,255,.4); border-top-color: white;
    border-radius: 50%; animation: spin .6s linear infinite; vertical-align: middle; margin-right: 6px;
  }
  @keyframes spin { to{transform:rotate(360deg)} }

  footer { text-align: center; margin-top: 24px; font-size: 11px; color: rgba(255,255,255,.6); }
</style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-mark">
      <svg viewBox="0 0 20 20" xmlns="http://www.w3.org/2000/svg">
        <rect x="1" y="12" width="3.5" height="6" rx="0.8" fill="white"/>
        <rect x="6" y="8" width="3.5" height="10" rx="0.8" fill="white"/>
        <rect x="11" y="4" width="3.5" height="14" rx="0.8" fill="white"/>
        <rect x="16" y="1" width="3.5" height="17" rx="0.8" fill="white"/>
      </svg>
    </div>
    <div>
      <div class="logo-text">Playtag Ops</div>
      <div class="logo-sub">Daily Operations Dashboard</div>
    </div>
  </div>

  <h2>로그인</h2>
  <p class="desc">담당자 계정으로 로그인해주세요.</p>

  <div class="error" id="error-msg">아이디 또는 비밀번호가 올바르지 않습니다.</div>

  <div class="field">
    <label>아이디</label>
    <input type="text" id="id" placeholder="아이디 입력" autocomplete="username">
  </div>
  <div class="field">
    <label>비밀번호</label>
    <input type="password" id="pw" placeholder="비밀번호 입력" autocomplete="current-password">
  </div>

  <button class="btn" id="login-btn" onclick="doLogin()">로그인</button>
</div>

<footer>© Playtag · 운영팀 전용</footer>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzrliD6JIDRNIEllNcaWzZlcGuL7i7C3h-kHLuWYg0Xrv9F0doeqDXvCaWaDtu_4aU6dA/exec';

// 이미 로그인된 경우 대시보드로 이동
window.addEventListener('load', () => {
  const token = localStorage.getItem('pt_token');
  const expires = localStorage.getItem('pt_expires');
  if (token && expires && Date.now() < parseInt(expires)) {
    goToDashboard();
  }
});

document.getElementById('pw').addEventListener('keydown', e => {
  if (e.key === 'Enter') doLogin();
});
document.getElementById('id').addEventListener('keydown', e => {
  if (e.key === 'Enter') document.getElementById('pw').focus();
});

async function doLogin() {
  const id = document.getElementById('id').value.trim();
  const pw = document.getElementById('pw').value.trim();
  if (!id || !pw) return;

  const btn = document.getElementById('login-btn');
  btn.disabled = true;
  btn.innerHTML = '<span class="spinner"></span>확인 중...';
  document.getElementById('error-msg').classList.remove('show');

  try {
    const res = await fetch(`${API}?action=login&id=${encodeURIComponent(id)}&pw=${encodeURIComponent(pw)}`);
    const data = await res.json();

    if (data.ok) {
      localStorage.setItem('pt_token', data.token);
      localStorage.setItem('pt_branch', data.branch);
      localStorage.setItem('pt_id', data.id);
      localStorage.setItem('pt_expires', data.expires);
      goToDashboard();
    } else {
      document.getElementById('error-msg').classList.add('show');
      btn.disabled = false;
      btn.textContent = '로그인';
    }
  } catch (e) {
    document.getElementById('error-msg').textContent = '서버 연결에 실패했습니다. 잠시 후 다시 시도해주세요.';
    document.getElementById('error-msg').classList.add('show');
    btn.disabled = false;
    btn.textContent = '로그인';
  }
}

function goToDashboard() {
  window.location.href = 'index.html';
}
</script>
</body>
</html>
